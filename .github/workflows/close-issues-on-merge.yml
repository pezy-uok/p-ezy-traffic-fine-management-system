name: Close Issues on PR Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-issues:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    
    steps:
      - name: Close linked issues and update labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prTitle = pr.title;
            const prBody = pr.body || '';
            const prUrl = pr.html_url;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`🔍 Processing PR #${prNumber}: "${prTitle}"`);

            // Extract PEZY issue references
            const text = `${prTitle} ${prBody}`;
            const pezyPattern = /PEZY-(\d+)/g;
            const githubPattern = /(closes|fixes|resolves)\s+#(\d+)/gi;

            let pezyIssues = new Set();
            let githubIssues = new Set();

            // Find all PEZY-XXX references
            let match;
            while ((match = pezyPattern.exec(text)) !== null) {
              pezyIssues.add(match[1]);
            }

            // Find all GitHub issue references with keywords
            while ((match = githubPattern.exec(text)) !== null) {
              githubIssues.add(match[2]);
            }

            console.log(`Found PEZY issues: ${pezyIssues.size > 0 ? [...pezyIssues].map(id => `PEZY-${id}`).join(', ') : 'none'}`);
            console.log(`Found GitHub issues: ${githubIssues.size > 0 ? [...githubIssues].map(id => `#${id}`).join(', ') : 'none'}`);

            let issueNumbers = new Set(githubIssues);

            // Convert PEZY-XXX to GitHub issue numbers by searching
            if (pezyIssues.size > 0) {
              console.log(`🔍 Searching for GitHub issues linked to PEZY issues...`);
              
              for (const pezyId of pezyIssues) {
                try {
                  const searchQuery = `repo:${owner}/${repo} PEZY-${pezyId} in:title`;
                  const searchResult = await github.rest.search.issuesAndPullRequests({
                    q: searchQuery,
                    per_page: 1
                  });

                  if (searchResult.data.items && searchResult.data.items.length > 0) {
                    const issueNum = searchResult.data.items[0].number;
                    issueNumbers.add(String(issueNum));
                    console.log(`  ✓ PEZY-${pezyId} → GitHub issue #${issueNum}`);
                  } else {
                    console.log(`  ✗ GitHub issue not found for PEZY-${pezyId}`);
                  }
                } catch (error) {
                  console.log(`  ⚠ Error searching for PEZY-${pezyId}: ${error.message}`);
                }
              }
            }

            if (issueNumbers.size === 0) {
              console.log(`❌ No linked GitHub issues found`);
              return;
            }

            console.log(`\n✅ Found ${issueNumbers.size} GitHub issue(s) to close: ${[...issueNumbers].map(id => `#${id}`).join(', ')}\n`);

            // Close each issue and update status labels
            let closedCount = 0;
            for (const issueNum of issueNumbers) {
              try {
                console.log(`  Closing issue #${issueNum}...`);

                // Close the issue
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: parseInt(issueNum),
                  state: 'closed'
                });

                // Add comment
                const commentBody = `✅ **Closed by PR #${prNumber}**\n\n[View PR](${prUrl})`;
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: parseInt(issueNum),
                  body: commentBody
                });

                // Get current labels
                const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                  owner,
                  repo,
                  issue_number: parseInt(issueNum),
                  per_page: 100
                });

                const labelNames = currentLabels.map(l => l.name);
                const statusLabels = labelNames.filter(l => l.startsWith('status:'));

                // Remove all existing status labels
                for (const statusLabel of statusLabels) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: parseInt(issueNum),
                      name: statusLabel
                    });
                    console.log(`    ✓ Removed: ${statusLabel}`);
                  } catch (error) {
                    console.log(`    ⚠ Could not remove ${statusLabel}: ${error.message}`);
                  }
                }

                // Add "status: done" label
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: parseInt(issueNum),
                  labels: ['status: done']
                });

                console.log(`    ✓ Added: status: done`);
                console.log(`    ✓ Issue #${issueNum} closed successfully\n`);
                closedCount++;

              } catch (error) {
                console.log(`    ✗ Error processing issue #${issueNum}: ${error.message}\n`);
              }
            }

            console.log(`📊 Summary: ${closedCount}/${issueNumbers.size} issues closed`);
