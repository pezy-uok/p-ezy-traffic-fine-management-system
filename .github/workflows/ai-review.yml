name: AI Code Review (Groq)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Generate AI code review with Groq
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'ai-review')
    steps:
      - name: Add rocket reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR information
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return {
              base: pr.data.base.ref,
              head: pr.data.head.ref,
              title: pr.data.title,
              description: pr.data.body || 'No description provided',
              author: pr.data.user.login
            };

      - name: Checkout PR branch
        run: |
          git fetch origin ${{ fromJSON(steps.pr_info.outputs.result).head }}
          git checkout ${{ fromJSON(steps.pr_info.outputs.result).head }}

      - name: Generate code diff
        id: diff
        run: |
          git fetch origin ${{ fromJSON(steps.pr_info.outputs.result).base }}
          DIFF=$(git diff origin/${{ fromJSON(steps.pr_info.outputs.result).base }}...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI code review with Groq
        uses: actions/github-script@v7
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const prDetails = ${{ steps.pr_info.outputs.result }};
            const diff = process.env.PR_DIFF || '';

            const maxDiffLength = 30000;
            const truncatedDiff = diff.length > maxDiffLength
              ? diff.substring(0, maxDiffLength) + '\n\n... (diff truncated due to length)'
              : diff;

            const systemPrompt = 'You are an expert code reviewer. Provide concise, actionable feedback.';
            
            const codeBlock = '```';
            const userPrompt = 'Review this pull request:\n\n' +
              'PR Title: ' + prDetails.title + '\n' +
              'PR Description: ' + prDetails.description + '\n' +
              'PR Author: ' + prDetails.author + '\n\n' +
              'Code Changes:\n' + codeBlock + 'diff\n' + truncatedDiff + '\n' + codeBlock + '\n\n' +
              'Provide:\n' +
              '1. Brief summary of changes\n' +
              '2. Potential issues or bugs\n' +
              '3. Code quality and best practices feedback\n' +
              '4. Security concerns (if any)\n' +
              '5. Suggestions for improvement\n\n' +
              'Keep your review concise and actionable.';

            const groqKey = process.env.GROQ_API_KEY;

            try {
              const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${groqKey}`
                },
                body: JSON.stringify({
                  model: 'llama-3.3-70b-versatile',
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                  ],
                  temperature: 0.7,
                  max_tokens: 4096
                })
              });

              if (!response.ok) {
                const errorBody = await response.text();
                throw new Error(`Groq API returned ${response.status}: ${errorBody}`);
              }

              const data = await response.json();
              const review = data.choices[0].message.content;

              const commentBody = '## 🤖 AI Code Review\n\n' + review + '\n\n---\n*Review powered by Groq (Llama 3)*';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });

              console.log('✅ AI review posted successfully');
            } catch (error) {
              console.error('❌ Error during AI review:', error.message);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## 🤖 AI Code Review\n\n⚠️ Unable to generate automated review: ' + error.message
              });
            }
