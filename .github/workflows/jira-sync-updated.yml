name: Sync Updated Jira Issues to GitHub

on:
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Sync issues updated in the last N hours (default: 24)'
        required: false
        default: '24'
      force_keys:
        description: 'Optional: Comma-separated Jira keys to force sync (e.g., PEZY-1,PEZY-5)'
        required: false
        default: ''

permissions:
  issues: write
  contents: read

jobs:
  sync-updated-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Updated Jira Issues to GitHub
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
          JIRA_BASE_URL: 'https://oshadadilshan.atlassian.net'
          JIRA_EMAIL: 'gimansabandara2001@gmail.com'
          JIRA_PROJECT: 'PEZY'
          HOURS_BACK: ${{ github.event.inputs.hours_back || 24 }}
          FORCE_KEYS: ${{ github.event.inputs.force_keys }}
        with:
          script: |
            const { JIRA_API_TOKEN, JIRA_EMAIL, JIRA_BASE_URL, JIRA_PROJECT, HOURS_BACK, FORCE_KEYS } = process.env;
            const hoursBack = parseInt(HOURS_BACK) || 24;
            const forceKeys = FORCE_KEYS?.trim() 
              ? FORCE_KEYS.split(',').map(k => k.trim().toUpperCase()).filter(k => k)
              : [];

            const sleep = (ms) => new Promise(res => setTimeout(res, ms));
            const authHeader = Buffer.from(`${JIRA_EMAIL}:${JIRA_API_TOKEN}`).toString('base64');

            console.log('═══════════════════════════════════════════════════════════════');
            console.log('JIRA → GITHUB SYNC (Updated Issues Only)');
            console.log('═══════════════════════════════════════════════════════════════');
            console.log(`Hours back: ${hoursBack}`);
            if (forceKeys.length > 0) {
              console.log(`Force sync keys: ${forceKeys.join(', ')}`);
            }
            console.log('');

            // ─────────────────────────────────────────────────────────────
            // STEP 1: Calculate cutoff time and build JQL query
            // ─────────────────────────────────────────────────────────────
            const cutoffTime = new Date(Date.now() - hoursBack * 60 * 60 * 1000);
            const cutoffISO = cutoffTime.toISOString().replace('Z', '');
            
            let jqlQuery = `project = "${JIRA_PROJECT}" AND updated >= "${cutoffISO}"`;
            
            if (forceKeys.length > 0) {
              const forceCondition = forceKeys.map(k => `key = "${k}"`).join(' OR ');
              jqlQuery = `(project = "${JIRA_PROJECT}" AND updated >= "${cutoffISO}") OR (project = "${JIRA_PROJECT}" AND (${forceCondition}))`;
            }

            console.log(`─── Step 1: Fetching Updated Jira Issues ───`);
            console.log(`Cutoff time: ${cutoffTime.toISOString()}`);
            console.log(`JQL: ${jqlQuery}`);
            console.log('');

            // ─────────────────────────────────────────────────────────────
            // STEP 2: Fetch all updated issues from Jira
            // ─────────────────────────────────────────────────────────────
            const jiraIssues = new Map();
            let startAt = 0;
            const maxResults = 100;
            let totalReported = null;

            while (true) {
              const jiraUrl = `${JIRA_BASE_URL}/rest/api/3/search` +
                `?jql=${encodeURIComponent(jqlQuery)}` +
                `&maxResults=${maxResults}&startAt=${startAt}` +
                `&fields=summary,description,status,issuetype,priority,assignee,created,updated`;

              const res = await fetch(jiraUrl, {
                headers: {
                  'Authorization': `Basic ${authHeader}`,
                  'Accept': 'application/json'
                }
              });

              if (!res.ok) {
                const errText = await res.text();
                console.error(`Jira fetch failed: ${res.status} ${errText}`);
                break;
              }

              const data = await res.json();

              if (totalReported === null) {
                totalReported = data.total || 0;
                console.log(`Jira reports ${totalReported} updated issues.`);
              }

              const batch = data.issues || [];
              if (batch.length === 0) {
                console.log('✓ All issues fetched.');
                break;
              }

              for (const issue of batch) {
                jiraIssues.set(issue.key, issue);
              }

              console.log(`Fetched ${batch.length} issues (page offset: ${startAt})`);

              startAt += maxResults;
              if (startAt >= totalReported) {
                break;
              }

              await sleep(300);
            }

            const allJiraIssues = Array.from(jiraIssues.values());
            console.log(`✓ Total updated issues: ${allJiraIssues.length}`);
            console.log('');

            // ─────────────────────────────────────────────────────────────
            // STEP 3: Build GitHub knowledge base
            // ─────────────────────────────────────────────────────────────
            const existingJiraKeys = new Set();
            let ghPage = 1;

            console.log('─── Step 2: Reading Existing GitHub Issues ───');
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100,
                page: ghPage
              });

              if (issues.length === 0) break;

              for (const i of issues) {
                const text = `${i.title} ${i.body || ''}`;
                const matches = text.matchAll(/PEZY-\d+/g);
                for (const m of matches) existingJiraKeys.add(m[0]);
              }

              console.log(`GitHub page ${ghPage}: ${issues.length} issues, ${existingJiraKeys.size} Jira keys found`);
              ghPage++;
              if (ghPage > 100) break;
            }

            console.log(`✓ GitHub has ${existingJiraKeys.size} known Jira keys`);
            console.log('');

            // ─────────────────────────────────────────────────────────────
            // STEP 4: Sync issues (create new, update existing)
            // ─────────────────────────────────────────────────────────────
            console.log('─── Step 3: Syncing Issues ───');
            let created = 0, updated = 0, skipped = 0, errors = 0;

            for (const issue of allJiraIssues) {
              const key = issue.key;
              const summary = issue.fields.summary;
              const status = issue.fields.status?.name || 'Unknown';
              const description = issue.fields.description?.content
                ? extractPlainText(issue.fields.description.content)
                : 'No description provided.';
              const type_ = issue.fields.issuetype?.name || 'Unknown';
              const priority = issue.fields.priority?.name || 'None';
              const assignee = issue.fields.assignee?.displayName || 'Unassigned';

              if (existingJiraKeys.has(key)) {
                // Try to find and update existing issue
                console.log(`🔄 Updating ${key}...`);
                
                try {
                  // Search for the GitHub issue
                  const { data: searchIssues } = await github.rest.search.issuesAndPullRequests({
                    q: `repo:${context.repo.owner}/${context.repo.repo} "${key}" type:issue`,
                  });

                  if (searchIssues.items.length > 0) {
                    const ghIssueNum = searchIssues.items[0].number;
                    const labels = createLabels(type_, priority, status);
                    const body = createIssueBody(key, issue, description);

                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: ghIssueNum,
                      body: body,
                      labels: labels
                    });

                    updated++;
                    console.log(`✓ Updated #${ghIssueNum}`);
                    await sleep(1000);
                  } else {
                    skipped++;
                  }
                } catch (err) {
                  errors++;
                  console.error(`✗ Error updating ${key}: ${err.message}`);
                }
              } else {
                // Create new issue
                console.log(`➕ Creating ${key}...`);
                
                try {
                  const labels = createLabels(type_, priority, status);
                  const body = createIssueBody(key, issue, description);
                  const title = `${key}: ${summary}`;

                  const { data: newIssue } = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: body,
                    labels: labels
                  });

                  // Close if status is Done
                  if (status.toLowerCase() === 'done') {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: newIssue.number,
                      state: 'closed'
                    });
                  }

                  existingJiraKeys.add(key);
                  created++;
                  console.log(`✓ Created #${newIssue.number}`);
                  await sleep(3500);
                } catch (err) {
                  errors++;
                  if (err.message.toLowerCase().includes('secondary rate limit')) {
                    console.error('Secondary rate limit hit — stopping early');
                    break;
                  }
                  console.error(`✗ Error creating ${key}: ${err.message}`);
                }
              }
            }

            // ─────────────────────────────────────────────────────────────
            // Helper functions
            // ─────────────────────────────────────────────────────────────
            function extractPlainText(content) {
              const parts = [];
              const walk = (node) => {
                if (node.type === 'text' && node.text) parts.push(node.text);
                if (node.content) node.content.forEach(walk);
              };
              content.forEach(walk);
              return parts.join(' ').trim() || 'No description provided.';
            }

            function createLabels(type_, priority, status) {
              const labels = ['jira-synced'];
              
              const typeMap = {
                'Story': 'enhancement',
                'Task': 'chore',
                'Bug': 'bug',
                'Epic': 'enhancement',
                'Sub-task': 'chore',
                'Feature': 'enhancement',
              };
              
              const priorityMap = {
                'Highest': 'priority: critical',
                'High': 'priority: high',
                'Medium': 'priority: medium',
                'Low': 'priority: low',
                'Lowest': 'priority: low',
              };
              
              const statusMap = {
                'To Do': 'status: in progress',
                'In Progress': 'status: in progress',
                'In Review': 'status: needs review',
              };

              if (typeMap[type_]) labels.push(typeMap[type_]);
              if (priorityMap[priority]) labels.push(priorityMap[priority]);
              if (statusMap[status]) labels.push(statusMap[status]);
              
              return [...new Set(labels)];
            }

            function createIssueBody(key, issue, description) {
              const status = issue.fields.status?.name || 'Unknown';
              const type_ = issue.fields.issuetype?.name || 'Unknown';
              const priority = issue.fields.priority?.name || 'None';
              const assignee = issue.fields.assignee?.displayName || 'Unassigned';
              const created = issue.fields.created || 'N/A';
              const updated = issue.fields.updated || 'N/A';

              return [
                `### Jira Ticket: [${key}](${JIRA_BASE_URL}/browse/${key})`,
                '',
                '**Details:**',
                `- Type: ${type_}`,
                `- Priority: ${priority}`,
                `- Status: ${status}`,
                `- Assignee: ${assignee}`,
                `- Created: ${created}`,
                `- Updated: ${updated}`,
                '',
                '**Description:**',
                description
              ].join('\n');
            }

            // ─────────────────────────────────────────────────────────────
            // Summary
            // ─────────────────────────────────────────────────────────────
            console.log('');
            console.log('═══════════════════════════════════════════════════════════════');
            console.log('SYNC COMPLETE');
            console.log('═══════════════════════════════════════════════════════════════');
            console.log(`Created  : ${created}`);
            console.log(`Updated  : ${updated}`);
            console.log(`Skipped  : ${skipped}`);
            console.log(`Errors   : ${errors}`);
            console.log(`Total    : ${allJiraIssues.length}`);
