name: Jira Integration

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  sync-with-jira:
    name: Sync PR with Jira using Groq
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          # Truncate if too large (max 30KB for Groq)
          if [ ${#DIFF} -gt 30000 ]; then
            DIFF="${DIFF:0:30000}... (truncated)"
          fi
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update PR with Groq
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
          JIRA_BASE_URL: 'https://oshadadilshan.atlassian.net'
          JIRA_EMAIL: 'gimansabandara2001@gmail.com'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const title = context.payload.pull_request.title;
            const body = context.payload.pull_request.body || '';
            const prNumber = context.issue.number;
            const prDiff = process.env.PR_DIFF || '';

            console.log('=== Starting Jira-GitHub Integration ===');

            // Extract direct Jira references (must have actual numbers, not XXX)
            const jiraPattern = /PEZY-\d+/g;
            let jiraKeys = [...new Set((title + ' ' + body).match(jiraPattern) || [])];

            console.log(`Found ${jiraKeys.length} direct Jira references: ${jiraKeys.join(', ')}`);

            // Only skip if PR was ALREADY processed by this workflow (has AI-generated marker)
            const wasProcessedByWorkflow = body.includes('<!-- AI-GENERATED-PR-DESCRIPTION -->');
            if (wasProcessedByWorkflow) {
              console.log('PR was already processed by this workflow, skipping');
              return;
            }

            if (jiraKeys.length === 0) {
              console.log('No Jira reference found (PEZY-XXX with numbers), skipping Jira integration');
              return;
            }

            // Extract issue references (Fixes #123, Closes #456, etc.)
            const issueKeywords = ['fixes', 'closes', 'resolves', 'fix', 'close', 'resolve'];
            const issuePattern = new RegExp(`(${issueKeywords.join('|')})\\s+#(\\d+)`, 'gi');
            const issueMatches = [...body.matchAll(issuePattern)];

            console.log(`Found ${issueMatches.length} GitHub issue references`);

            // Fetch linked GitHub issues to extract Jira references
            let linkedIssues = [];
            for (const match of issueMatches) {
              const issueNumber = match[2];
              console.log(`Fetching GitHub issue #${issueNumber}...`);

              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNumber)
                });

                linkedIssues.push({
                  number: issueNumber,
                  title: issue.title,
                  body: issue.body || ''
                });

                // Extract Jira key from issue title or body
                const issueJiraKeys = (issue.title + ' ' + issue.body).match(jiraPattern) || [];
                jiraKeys = [...new Set([...jiraKeys, ...issueJiraKeys])];
                console.log(`Found Jira keys in issue #${issueNumber}: ${issueJiraKeys.join(', ')}`);
              } catch (error) {
                console.error(`Failed to fetch issue #${issueNumber}: ${error.message}`);
              }
            }

            if (jiraKeys.length === 0) {
              console.log('No Jira reference found, skipping Jira integration');
              return;
            }

            console.log(`Processing Jira keys: ${jiraKeys.join(', ')}`);

            // Fetch Jira issue details
            const jiraToken = process.env.JIRA_API_TOKEN;
            const jiraEmail = process.env.JIRA_EMAIL;
            const jiraBaseUrl = process.env.JIRA_BASE_URL;
            const geminiKey = process.env.GEMINI_API_KEY;

            if (!jiraToken) {
              console.log('⚠️ JIRA_API_TOKEN not configured, skipping Jira integration');
              return;
            }

            const authHeader = Buffer.from(`${jiraEmail}:${jiraToken}`).toString('base64');

            // Fetch details for all Jira issues
            let jiraIssues = [];
            for (const jiraKey of jiraKeys) {
              console.log(`Fetching Jira details for ${jiraKey}...`);

              try {
                const jiraResponse = await fetch(`${jiraBaseUrl}/rest/api/3/issue/${jiraKey}`, {
                  headers: {
                    'Authorization': `Basic ${authHeader}`,
                    'Accept': 'application/json'
                  }
                });

                if (!jiraResponse.ok) {
                  throw new Error(`Jira API returned ${jiraResponse.status}`);
                }

                const jiraIssue = await jiraResponse.json();

                // Extract description text from ADF format
                let description = 'No description';
                if (jiraIssue.fields.description?.content) {
                  const textParts = [];
                  const extractText = (node) => {
                    if (node.type === 'text' && node.text) {
                      textParts.push(node.text);
                    }
                    if (node.content) {
                      node.content.forEach(extractText);
                    }
                  };
                  jiraIssue.fields.description.content.forEach(extractText);
                  description = textParts.join(' ').trim();
                }

                jiraIssues.push({
                  key: jiraKey,
                  summary: jiraIssue.fields.summary,
                  description: description,
                  status: jiraIssue.fields.status.name,
                  type: jiraIssue.fields.issuetype.name,
                  url: `${jiraBaseUrl}/browse/${jiraKey}`
                });

                console.log(`✅ Fetched ${jiraKey}: ${jiraIssue.fields.summary}`);
              } catch (error) {
                console.error(`Failed to fetch ${jiraKey}: ${error.message}`);
              }
            }

            if (jiraIssues.length === 0) {
              core.setFailed('Failed to fetch Jira details');
              return;
            }

            const primaryJira = jiraIssues[0];

            // Use Groq (Llama 3) to generate PR title and description
            let generated;
            const groqKey = process.env.GROQ_API_KEY;
            
            if (groqKey) {
              console.log('Generating PR content with Groq (Llama 3)...');

              try {
                const systemPrompt = 'You are a technical writer helping to create a pull request description. Return ONLY valid JSON with no markdown code blocks.';
                
                const linkedIssuesList = linkedIssues.length > 0 
                  ? linkedIssues.map(function(i) { return '- #' + i.number + ': ' + i.title; }).join('\n') 
                  : 'None';
                const relatedSection = linkedIssues.length > 0 
                  ? '\\n\\n## Related Issues\\nFixes #' + linkedIssues[0].number 
                  : '';
                
                // Map Jira issue type to PR type checkboxes
                const jiraType = primaryJira.type.toLowerCase();
                let typeOfChange = '';
                if (jiraType.includes('bug')) {
                  typeOfChange = '- [x] Bug fix\\n- [ ] New feature\\n- [ ] Documentation\\n- [ ] Other';
                } else if (jiraType.includes('story') || jiraType.includes('feature') || jiraType.includes('task')) {
                  typeOfChange = '- [ ] Bug fix\\n- [x] New feature\\n- [ ] Documentation\\n- [ ] Other';
                } else if (jiraType.includes('doc')) {
                  typeOfChange = '- [ ] Bug fix\\n- [ ] New feature\\n- [x] Documentation\\n- [ ] Other';
                } else {
                  typeOfChange = '- [ ] Bug fix\\n- [ ] New feature\\n- [ ] Documentation\\n- [x] Other';
                }
                
                const userPrompt = 'Jira Issue Details:\n' +
                  '- Key: ' + primaryJira.key + '\n' +
                  '- Summary: ' + primaryJira.summary + '\n' +
                  '- Description: ' + primaryJira.description + '\n' +
                  '- Type: ' + primaryJira.type + '\n' +
                  '- Status: ' + primaryJira.status + '\n\n' +
                  'Linked GitHub Issues:\n' + linkedIssuesList + '\n\n' +
                  'Code Changes Summary:\n' + prDiff.substring(0, 4000) + '\n\n' +
                  'Generate a PR title and description. Return ONLY this JSON (no markdown):\n' +
                  '{\n' +
                  '  "title": "' + primaryJira.key + ': Brief summary based on actual code changes (max 72 chars)",\n' +
                  '  "description": "## Description\\n[2-3 sentences]\\n\\n## Type of Change\\n' + typeOfChange + '\\n\\n## Jira Reference\\n- Issue: [' + primaryJira.key + '](' + primaryJira.url + ')\\n\\n## Changes\\n- [bullet points]' + relatedSection + '"\n' +
                  '}';

                console.log('Calling Groq API...');
                const groqResponse = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${groqKey}`
                  },
                  body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [
                      { role: 'system', content: systemPrompt },
                      { role: 'user', content: userPrompt }
                    ],
                    temperature: 0.7,
                    max_tokens: 2048
                  })
                });

                console.log(`Groq API response status: ${groqResponse.status}`);
                
                if (!groqResponse.ok) {
                  const errorBody = await groqResponse.text();
                  console.error(`Groq API error ${groqResponse.status}: ${errorBody}`);
                  throw new Error(`Groq API returned ${groqResponse.status}: ${errorBody}`);
                }

                const groqData = await groqResponse.json();
                console.log('Groq response received');
                
                if (!groqData.choices || !groqData.choices[0]) {
                  console.error('Groq response structure:', JSON.stringify(groqData));
                  throw new Error('Invalid Groq response structure');
                }
                
                const groqText = groqData.choices[0].message.content;
                console.log('Groq text:', groqText.substring(0, 300) + '...');

                // Extract JSON from response (handle markdown code blocks)
                let jsonMatch = groqText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) {
                  throw new Error('No JSON found in Groq response');
                }

                generated = JSON.parse(jsonMatch[0]);

                console.log('Groq generated:');
                console.log('Title:', generated.title);
                console.log('Description length:', generated.description.length);

                // Add marker to prevent re-processing and update PR
                const markedDescription = '<!-- AI-GENERATED-PR-DESCRIPTION -->\n' + generated.description;
                
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  title: generated.title,
                  body: markedDescription
                });

                console.log('Updated PR title and description');

              } catch (error) {
                console.error('Groq generation failed: ' + error.message);

                // Map Jira issue type to PR type checkboxes for fallback
                const jiraTypeFallback = primaryJira.type.toLowerCase();
                let typeCheckboxes = '';
                if (jiraTypeFallback.includes('bug')) {
                  typeCheckboxes = '- [x] Bug fix\n- [ ] New feature\n- [ ] Documentation\n- [ ] Other';
                } else if (jiraTypeFallback.includes('story') || jiraTypeFallback.includes('feature') || jiraTypeFallback.includes('task')) {
                  typeCheckboxes = '- [ ] Bug fix\n- [x] New feature\n- [ ] Documentation\n- [ ] Other';
                } else if (jiraTypeFallback.includes('doc')) {
                  typeCheckboxes = '- [ ] Bug fix\n- [ ] New feature\n- [x] Documentation\n- [ ] Other';
                } else {
                  typeCheckboxes = '- [ ] Bug fix\n- [ ] New feature\n- [ ] Documentation\n- [x] Other';
                }

                // Fallback: Use template-based description
                const fallbackDescription = '<!-- AI-GENERATED-PR-DESCRIPTION -->\n' +
                  '## Description\n' + primaryJira.summary + '\n\n' +
                  '## Type of Change\n' + typeCheckboxes + '\n\n' +
                  '## Jira Reference\n' +
                  '- Issue: [' + primaryJira.key + '](' + primaryJira.url + ')\n\n' +
                  '## Description from Jira\n' + primaryJira.description;

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  title: primaryJira.key + ': ' + primaryJira.summary,
                  body: fallbackDescription
                });

                console.log('Updated PR with fallback template');
              }
            } else {
              console.log('GROQ_API_KEY not configured, using fallback');

              // Map Jira issue type to PR type checkboxes
              const jiraTypeNoKey = primaryJira.type.toLowerCase();
              let typeBoxes = '';
              if (jiraTypeNoKey.includes('bug')) {
                typeBoxes = '- [x] Bug fix\n- [ ] New feature\n- [ ] Documentation\n- [ ] Other';
              } else if (jiraTypeNoKey.includes('story') || jiraTypeNoKey.includes('feature') || jiraTypeNoKey.includes('task')) {
                typeBoxes = '- [ ] Bug fix\n- [x] New feature\n- [ ] Documentation\n- [ ] Other';
              } else if (jiraTypeNoKey.includes('doc')) {
                typeBoxes = '- [ ] Bug fix\n- [ ] New feature\n- [x] Documentation\n- [ ] Other';
              } else {
                typeBoxes = '- [ ] Bug fix\n- [ ] New feature\n- [ ] Documentation\n- [x] Other';
              }

              // Fallback without Groq
              const fallbackDescription = '<!-- AI-GENERATED-PR-DESCRIPTION -->\n' +
                '## Description\n' + primaryJira.summary + '\n\n' +
                '## Type of Change\n' + typeBoxes + '\n\n' +
                '## Jira Reference\n' +
                '- Issue: [' + primaryJira.key + '](' + primaryJira.url + ')\n\n' +
                '## Description from Jira\n' + primaryJira.description;

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                title: primaryJira.key + ': ' + primaryJira.summary,
                body: fallbackDescription
              });

              console.log('Updated PR with template');
            }

            // Add jira-linked label
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'jira-linked',
                color: '0366d6',
                description: 'PR is linked to a Jira issue'
              });
            } catch (error) {
              // Label exists
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['jira-linked']
            });

            // Add comment to Jira issue linking the PR
            console.log('Adding PR link to Jira issue...');
            try {
              const prUrl = context.payload.pull_request.html_url;
              const prAuthor = context.payload.pull_request.user.login;

              const jiraComment = {
                body: {
                  version: 1,
                  type: 'doc',
                  content: [
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: '🔗 ',
                          marks: []
                        },
                        {
                          type: 'text',
                          text: 'GitHub Pull Request',
                          marks: [{ type: 'strong' }]
                        }
                      ]
                    },
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: `PR #${prNumber}: `,
                          marks: []
                        },
                        {
                          type: 'text',
                          text: generated?.title || title,
                          marks: [{ type: 'link', attrs: { href: prUrl } }]
                        }
                      ]
                    },
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: `Author: @${prAuthor}`,
                          marks: []
                        }
                      ]
                    },
                    {
                      type: 'paragraph',
                      content: [
                        {
                          type: 'text',
                          text: `Status: ${context.payload.pull_request.state}`,
                          marks: []
                        }
                      ]
                    }
                  ]
                }
              };

              const jiraCommentResponse = await fetch(`${jiraBaseUrl}/rest/api/3/issue/${primaryJira.key}/comment`, {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${authHeader}`,
                  'Accept': 'application/json',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(jiraComment)
              });

              if (jiraCommentResponse.ok) {
                console.log(`✅ Added PR link to Jira issue ${primaryJira.key}`);
              } else {
                const errorText = await jiraCommentResponse.text();
                console.error(`Failed to add Jira comment: ${jiraCommentResponse.status} - ${errorText}`);
              }
            } catch (error) {
              console.error(`Error adding Jira comment: ${error.message}`);
            }

            console.log('✅ Jira integration complete');

  validate-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Check commits for Jira references
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const jiraPattern = /PEZY-\d+/;
            const invalidCommits = [];

            for (const commit of commits) {
              const message = commit.commit.message;
              const firstLine = message.split('\n')[0];

              // Skip merge commits
              if (firstLine.startsWith('Merge ')) {
                continue;
              }

              if (!jiraPattern.test(firstLine)) {
                invalidCommits.push(`❌ \`${commit.sha.substring(0, 7)}\`: ${firstLine.substring(0, 60)}...`);
              }
            }

            if (invalidCommits.length > 0) {
              console.log(`Found ${invalidCommits.length} commits without Jira references`);
            }