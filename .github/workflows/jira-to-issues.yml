name: Full Jira to GitHub Sync

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger to clear the backlog

permissions:
  issues: write
  contents: read

jobs:
  sync-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Issues
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
          JIRA_BASE_URL: 'https://oshadadilshan.atlassian.net'
          JIRA_EMAIL: 'gimansabandara2001@gmail.com'
          JIRA_PROJECT: 'PEZY'
        with:
          script: |
            const { JIRA_API_TOKEN, JIRA_EMAIL, JIRA_BASE_URL, JIRA_PROJECT } = process.env;
            const sleep = (ms) => new Promise(res => setTimeout(res, ms));

            const authHeader = Buffer.from(`${JIRA_EMAIL}:${JIRA_API_TOKEN}`).toString('base64');
            
            // 1. Fetch Jira Issues (Increased to 100 per run)
            const jql = encodeURIComponent(`project = ${JIRA_PROJECT} ORDER BY created DESC`);
            const jiraUrl = `${JIRA_BASE_URL}/rest/api/3/search/jql?jql=${jql}&maxResults=100&fields=summary,description,status`;
            
            const jiraRes = await fetch(jiraUrl, {
              headers: { 'Authorization': `Basic ${authHeader}`, 'Accept': 'application/json' }
            });
            const jiraData = await jiraRes.json();
            const jiraIssues = jiraData.issues || [];

            // 2. Paginate GitHub to find ALL existing Jira keys (to avoid duplicates)
            const existingJiraKeys = new Set();
            let page = 1;
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100,
                page: page
              });
              if (issues.length === 0) break;
              issues.forEach(issue => {
                const match = (issue.title + ' ' + (issue.body || '')).match(/PEZY-\d+/);
                if (match) existingJiraKeys.add(match[0]);
              });
              page++;
            }

            console.log(`Knowledge base: ${existingJiraKeys.size} issues already on GitHub.`);

            // 3. Process the Jira list
            for (const issue of jiraIssues) {
              const key = issue.key;
              const status = issue.fields.status.name;

              if (existingJiraKeys.has(key)) {
                console.log(`- Skipping ${key} (Already synced)`);
                continue;
              }

              // Parse Jira ADF description
              let desc = 'No description provided.';
              if (issue.fields.description?.content) {
                const parts = [];
                const walk = (n) => {
                  if (n.type === 'text') parts.push(n.text);
                  if (n.content) n.content.forEach(walk);
                };
                issue.fields.description.content.forEach(walk);
                desc = parts.join(' ').trim() || desc;
              }

              try {
                // Create the issue on GitHub
                const { data: newIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `${key}: ${issue.fields.summary}`,
                  body: `### Jira Issue: [${key}](${JIRA_BASE_URL}/browse/${key})\n\n${desc}`,
                  labels: ['jira-synced', `status: ${status.toLowerCase()}`]
                });

                // Auto-close if Jira status is Done
                if (status.toLowerCase() === 'done') {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: newIssue.number,
                    state: 'closed'
                  });
                  console.log(`+ ${key} (Created & Closed)`);
                } else {
                  console.log(`+ ${key} (Created Open)`);
                }

                // PAUSE to avoid Secondary Rate Limits
                await sleep(3000);

              } catch (err) {
                console.error(`Failed to create ${key}: ${err.message}`);
                if (err.message.includes('secondary rate limit')) {
                  console.log('Stopping loop to respect GitHub Rate Limits.');
                  break; 
                }
              }
            }