name: Full Jira to GitHub Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

permissions:
  issues: write
  contents: read

jobs:
  sync-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Sync All Issues
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
          JIRA_BASE_URL: 'https://oshadadilshan.atlassian.net'
          JIRA_EMAIL: 'gimansabandara2001@gmail.com'
          JIRA_PROJECT: 'PEZY'
        with:
          script: |
            const { JIRA_API_TOKEN, JIRA_EMAIL, JIRA_BASE_URL, JIRA_PROJECT } = process.env;
            const sleep = (ms) => new Promise(res => setTimeout(res, ms));
            const authHeader = Buffer.from(`${JIRA_EMAIL}:${JIRA_API_TOKEN}`).toString('base64');
            
            // 1. SAFE PAGINATED JIRA FETCH
            let allJiraIssues = [];
            let startAt = 0;
            const maxResults = 100;
            
            console.log('--- Starting Jira Fetch ---');
            while (true) {
              const jql = encodeURIComponent(`project = ${JIRA_PROJECT} ORDER BY created DESC`);
              const jiraUrl = `${JIRA_BASE_URL}/rest/api/3/search/jql?jql=${jql}&maxResults=${maxResults}&startAt=${startAt}&fields=summary,description,status`;
              
              const res = await fetch(jiraUrl, {
                headers: { 'Authorization': `Basic ${authHeader}`, 'Accept': 'application/json' }
              });

              if (!res.ok) break;

              const data = await res.json();
              const batch = data.issues || [];
              
              // STOP if Jira returns an empty page
              if (batch.length === 0) {
                console.log('No more Jira issues found.');
                break;
              }

              allJiraIssues = allJiraIssues.concat(batch);
              console.log(`Fetched ${allJiraIssues.length} issues from Jira...`);
              
              if (data.total && allJiraIssues.length >= data.total) break;
              
              startAt += maxResults;
              if (startAt > 2000) break; // Hard limit for safety
            }

            // 2. STRENGTHENED GITHUB KNOWLEDGE BASE
            const existingJiraKeys = new Set();
            let ghPage = 1;
            console.log('--- Checking Existing GitHub Issues ---');
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all', // Must check open and closed
                per_page: 100,
                page: ghPage
              });
              
              if (issues.length === 0) break;
              
              issues.forEach(i => {
                const match = (i.title + ' ' + (i.body || '')).match(/PEZY-\d+/);
                if (match) existingJiraKeys.add(match[0]);
              });
              
              console.log(`Page ${ghPage}: Found ${issues.length} total items.`);
              ghPage++;
              if (ghPage > 50) break; // Safety cap
            }
            console.log(`Knowledge Base: ${existingJiraKeys.size} unique keys tracked.`);

            // 3. SYNC LOOP
            for (const issue of allJiraIssues) {
              const key = issue.key;
              const status = issue.fields.status.name;

              // SKIP if already on GitHub
              if (existingJiraKeys.has(key)) {
                continue;
              }

              let desc = 'No description.';
              if (issue.fields.description?.content) {
                const parts = [];
                const walk = (n) => {
                  if (n.type === 'text') parts.push(n.text);
                  if (n.content) n.content.forEach(walk);
                };
                issue.fields.description.content.forEach(walk);
                desc = parts.join(' ').trim() || desc;
              }

              try {
                const { data: newIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `${key}: ${issue.fields.summary}`,
                  body: `### Jira: [${key}](${JIRA_BASE_URL}/browse/${key})\n\n${desc}`,
                  labels: ['jira-synced', `status: ${status.toLowerCase()}`]
                });

                if (status.toLowerCase() === 'done') {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: newIssue.number,
                    state: 'closed'
                  });
                }
                
                console.log(`+ Synced ${key}`);
                
                // CRITICAL: 3.5s delay to prevent GitHub Rate Limits
                await sleep(3500);

              } catch (err) {
                if (err.message.includes('secondary rate limit')) {
                  console.log('Rate limit hit. Stopping execution.');
                  break; 
                }
                console.error(`Error with ${key}: ${err.message}`);
              }
            }