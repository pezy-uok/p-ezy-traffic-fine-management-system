name: Full Jira to GitHub Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Sync All Issues
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
          JIRA_BASE_URL: 'https://oshadadilshan.atlassian.net'
          JIRA_EMAIL: 'gimansabandara2001@gmail.com'
          JIRA_PROJECT: 'PEZY'
        with:
          script: |
            const { JIRA_API_TOKEN, JIRA_EMAIL, JIRA_BASE_URL, JIRA_PROJECT } = process.env;
            const sleep = (ms) => new Promise(res => setTimeout(res, ms));
            const authHeader = Buffer.from(`${JIRA_EMAIL}:${JIRA_API_TOKEN}`).toString('base64');

            // ─────────────────────────────────────────────────────────────
            // STEP 1: FETCH ALL JIRA ISSUES (deduplicated by key)
            // ─────────────────────────────────────────────────────────────
            // Using a Map keyed by Jira issue key prevents duplicates that
            // arise when Jira re-serves the same issue across pages (common
            // with ORDER BY on mutable fields while data changes mid-fetch).
            const jiraIssueMap = new Map();
            let startAt = 0;
            const maxResults = 100;
            let totalReported = null;

            console.log('─── Step 1: Fetching Jira Issues ───');
            while (true) {
              const jql = encodeURIComponent(
                `project = ${JIRA_PROJECT} ORDER BY created ASC`
                // ASC is more stable for pagination — new issues append to
                // the end, so earlier pages don't shift during a long fetch.
              );
              const jiraUrl = `${JIRA_BASE_URL}/rest/api/3/search/jql` +
                `?jql=${jql}&maxResults=${maxResults}&startAt=${startAt}` +
                `&fields=summary,description,status`;

              const res = await fetch(jiraUrl, {
                headers: {
                  'Authorization': `Basic ${authHeader}`,
                  'Accept': 'application/json'
                }
              });

              if (!res.ok) {
                const errText = await res.text();
                console.error(`Jira fetch failed at startAt=${startAt}: ${res.status} ${errText}`);
                break;
              }

              const data = await res.json();

              // Capture total on first page
              if (totalReported === null) {
                totalReported = data.total || 0;
                console.log(`Jira reports ${totalReported} total issues.`);
              }

              const batch = data.issues || [];
              if (batch.length === 0) {
                console.log('Empty page received — fetch complete.');
                break;
              }

              // Deduplicate: Map.set overwrites any previous entry for the same key
              for (const issue of batch) {
                jiraIssueMap.set(issue.key, issue);
              }

              console.log(
                `Fetched page startAt=${startAt} (+${batch.length} issues) ` +
                `| unique so far: ${jiraIssueMap.size} / ${totalReported}`
              );

              startAt += maxResults;

              // Stop when we've consumed all pages
              if (startAt >= totalReported) {
                console.log('All pages consumed.');
                break;
              }

              // Hard safety cap: 10 000 issues max
              if (startAt > 10000) {
                console.warn('Safety cap reached at 10 000 issues — stopping Jira fetch.');
                break;
              }

              // Small delay to avoid hammering Jira API
              await sleep(300);
            }

            const allJiraIssues = Array.from(jiraIssueMap.values());
            console.log(`✓ Unique Jira issues fetched: ${allJiraIssues.length}`);

            // ─────────────────────────────────────────────────────────────
            // STEP 2: BUILD GITHUB KNOWLEDGE BASE (all existing Jira keys)
            // ─────────────────────────────────────────────────────────────
            const existingJiraKeys = new Set();
            let ghPage = 1;

            console.log('─── Step 2: Reading Existing GitHub Issues ───');
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',       // include open AND closed
                per_page: 100,
                page: ghPage
              });

              if (issues.length === 0) break;

              for (const i of issues) {
                // Match any PEZY-NNNN pattern in title or body
                const text = `${i.title} ${i.body || ''}`;
                const matches = text.matchAll(/PEZY-\d+/g);
                for (const m of matches) existingJiraKeys.add(m[0]);
              }

              console.log(
                `GitHub page ${ghPage}: ${issues.length} items | ` +
                `known keys so far: ${existingJiraKeys.size}`
              );

              ghPage++;
              if (ghPage > 100) {
                console.warn('GitHub pagination safety cap reached.');
                break;
              }
            }
            console.log(`✓ GitHub knowledge base: ${existingJiraKeys.size} unique Jira keys tracked.`);

            // ─────────────────────────────────────────────────────────────
            // STEP 3: SYNC — create missing issues, skip known ones
            // ─────────────────────────────────────────────────────────────
            console.log('─── Step 3: Syncing Issues ───');
            let created = 0, skipped = 0, errors = 0;

            for (const issue of allJiraIssues) {
              const key   = issue.key;
              const status = issue.fields.status.name;

              // ── Skip if this key is already on GitHub ──────────────────
              // This check covers both pre-existing issues AND issues that
              // were created earlier in THIS same run (we add to the set
              // below after each successful create).
              if (existingJiraKeys.has(key)) {
                skipped++;
                continue;
              }

              // ── Extract plain text from Jira's Atlassian Document Format
              let desc = 'No description provided.';
              if (issue.fields.description?.content) {
                const parts = [];
                const walk = (node) => {
                  if (node.type === 'text' && node.text) parts.push(node.text);
                  if (node.content) node.content.forEach(walk);
                };
                issue.fields.description.content.forEach(walk);
                const extracted = parts.join(' ').trim();
                if (extracted) desc = extracted;
              }

              // ── Create GitHub issue ────────────────────────────────────
              try {
                const { data: newIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `${key}: ${issue.fields.summary}`,
                  body: [
                    `### Jira Ticket: [${key}](${JIRA_BASE_URL}/browse/${key})`,
                    `**Status:** ${status}`,
                    '',
                    desc
                  ].join('\n'),
                  labels: ['jira-synced', `status: ${status.toLowerCase()}`]
                });

                // Close the GitHub issue if Jira status is Done
                if (status.toLowerCase() === 'done') {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: newIssue.number,
                    state: 'closed'
                  });
                }

                // ── CRITICAL: mark this key as synced immediately ────────
                // Prevents re-processing this same key later in the loop
                // (e.g. if Jira returned it twice after dedup somehow failed).
                existingJiraKeys.add(key);
                created++;
                console.log(`+ Synced ${key} (GitHub #${newIssue.number}) [${status}]`);

                // 3.5 s delay to respect GitHub secondary rate limits
                await sleep(3500);

              } catch (err) {
                errors++;
                if (err.message.toLowerCase().includes('secondary rate limit')) {
                  console.error('Secondary rate limit hit — stopping sync early to avoid bans.');
                  break;
                }
                console.error(`✗ Error syncing ${key}: ${err.message}`);
                // Continue with next issue on non-rate-limit errors
              }
            }

            // ─────────────────────────────────────────────────────────────
            // SUMMARY
            // ─────────────────────────────────────────────────────────────
            console.log('─── Sync Complete ───');
            console.log(`  Jira issues found  : ${allJiraIssues.length}`);
            console.log(`  Created on GitHub  : ${created}`);
            console.log(`  Skipped (existing) : ${skipped}`);
            console.log(`  Errors             : ${errors}`);