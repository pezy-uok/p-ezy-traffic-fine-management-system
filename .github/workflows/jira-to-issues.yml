name: Sync Jira to GitHub Issues

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      jql_query:
        description: 'JQL query to filter Jira issues (optional)'
        required: false
        default: ''

permissions:
  issues: write
  contents: read

jobs:
  sync-jira-to-issues:
    name: Sync Jira Tasks to GitHub Issues
    runs-on: ubuntu-latest
    steps:
      - name: Sync Jira to GitHub Issues
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_KEY }}
          JIRA_BASE_URL: 'https://oshadadilshan.atlassian.net'
          JIRA_EMAIL: 'gimansabandara2001@gmail.com'
          JIRA_PROJECT: 'PEzy'
          JQL_QUERY: ${{ github.event.inputs.jql_query }}
        with:
          script: |
            const jiraToken = process.env.JIRA_API_TOKEN;
            const jiraEmail = process.env.JIRA_EMAIL;
            const jiraBaseUrl = process.env.JIRA_BASE_URL;
            const jiraProject = process.env.JIRA_PROJECT;
            const customJql = process.env.JQL_QUERY || '';

            if (!jiraToken) {
              console.log('JIRA_API_TOKEN not configured');
              return;
            }

            const authHeader = Buffer.from(jiraEmail + ':' + jiraToken).toString('base64');

            // Default JQL: Get only To Do issues from the project
            const jql = customJql || 'project = ' + jiraProject + ' AND status = "To Do" ORDER BY created DESC';
            
            console.log('Fetching Jira issues with JQL:', jql);
            console.log('Jira Base URL:', jiraBaseUrl);

            // Fetch ALL Jira issues with pagination using new API
            let allJiraIssues = [];
            let startAt = 0;
            const maxResults = 100;
            let hasMoreResults = true;
            
            // Paginate through all Jira issues
            while (hasMoreResults) {
              console.log('Fetching issues starting at ' + startAt + '...');
              
              // Use the new search/jql endpoint directly
              const searchUrl = jiraBaseUrl + '/rest/api/3/search/jql?jql=' + encodeURIComponent(jql) + 
                '&startAt=' + startAt + 
                '&maxResults=' + maxResults +
                '&fields=summary,description,issuetype,priority,status';
              
              const jiraResponse = await fetch(searchUrl, {
                method: 'GET',
                headers: {
                  'Authorization': 'Basic ' + authHeader,
                  'Accept': 'application/json'
                }
              });

              if (!jiraResponse.ok) {
                const errorText = await jiraResponse.text();
                console.error('Jira API error:', jiraResponse.status, errorText);
                core.setFailed('Jira API error: ' + jiraResponse.status);
                return;
              }

              const jiraData = await jiraResponse.json();
              
              // Log response structure for debugging
              console.log('Response keys:', Object.keys(jiraData).join(', '));
              
              // Handle different response formats (issues vs values)
              const issues = jiraData.issues || jiraData.values || [];
              const total = jiraData.total !== undefined ? jiraData.total : (jiraData.maxResults ? startAt + issues.length : issues.length);
              
              if (issues.length === 0) {
                hasMoreResults = false;
                break;
              }
              
              // Log first issue structure for debugging
              if (startAt === 0 && issues.length > 0) {
                console.log('First issue keys:', Object.keys(issues[0]).join(', '));
                if (issues[0].fields) {
                  console.log('First issue fields keys:', Object.keys(issues[0].fields).join(', '));
                }
              }
              
              allJiraIssues = allJiraIssues.concat(issues);
              startAt += maxResults;
              
              console.log('Fetched ' + issues.length + ' issues (total so far: ' + allJiraIssues.length + ')');
              
              // Check if we have more results
              if (jiraData.total !== undefined) {
                hasMoreResults = startAt < jiraData.total;
              } else {
                // If no total, check if we got fewer than max results
                hasMoreResults = issues.length === maxResults;
              }
            }
            
            console.log('Found ' + allJiraIssues.length + ' total Jira issues');
            
            if (allJiraIssues.length === 0) {
              console.log('No issues found. Check if PEZY project exists and has issues.');
              return;
            }

            // Get ALL existing GitHub issues to avoid duplicates (with pagination)
            let allGitHubIssues = [];
            let page = 1;
            let hasMore = true;
            
            while (hasMore) {
              const existingIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100,
                page: page
              });
              
              allGitHubIssues = allGitHubIssues.concat(existingIssues.data);
              hasMore = existingIssues.data.length === 100;
              page++;
            }

            const existingJiraKeys = new Set();
            allGitHubIssues.forEach(function(issue) {
              // Check if issue title or body contains a Jira key
              const match = (issue.title + ' ' + (issue.body || '')).match(/PEZY-\d+/);
              if (match) {
                existingJiraKeys.add(match[0]);
              }
            });

            console.log('Found ' + existingJiraKeys.size + ' existing GitHub issues linked to Jira');

            let createdCount = 0;
            let skippedCount = 0;

            for (const jiraIssue of allJiraIssues) {
              const jiraKey = jiraIssue.key;
              
              // Handle case where fields might not exist
              if (!jiraIssue.fields) {
                console.log('Skipping ' + jiraKey + ' - no fields data');
                skippedCount++;
                continue;
              }
              
              const summary = jiraIssue.fields.summary || 'No summary';
              const issueType = jiraIssue.fields.issuetype ? jiraIssue.fields.issuetype.name : 'Task';
              const priority = jiraIssue.fields.priority ? jiraIssue.fields.priority.name : 'Medium';
              const jiraUrl = jiraBaseUrl + '/browse/' + jiraKey;

              // Skip if already exists
              if (existingJiraKeys.has(jiraKey)) {
                console.log('Skipping ' + jiraKey + ' - already exists');
                skippedCount++;
                continue;
              }

              // Extract description text from ADF format
              let description = 'No description provided';
              if (jiraIssue.fields.description && jiraIssue.fields.description.content) {
                const textParts = [];
                const extractText = function(node) {
                  if (node.type === 'text' && node.text) {
                    textParts.push(node.text);
                  }
                  if (node.content) {
                    node.content.forEach(extractText);
                  }
                };
                jiraIssue.fields.description.content.forEach(extractText);
                description = textParts.join(' ').trim() || 'No description provided';
              }

              // Map Jira issue type to GitHub labels
              const labels = ['jira-synced'];
              
              // Add the Jira issue type as a label (e.g., "type: Bug", "type: Task", "type: Story")
              const typeLabel = 'type: ' + issueType;
              labels.push(typeLabel);
              
              // Extract a meaningful label from the summary (convert to kebab-case)
              // This creates labels like "payment-notification-system", "user-authentication", etc.
              const summaryLabel = summary
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')  // Remove special chars
                .replace(/\s+/g, '-')           // Replace spaces with hyphens
                .replace(/-+/g, '-')            // Remove multiple hyphens
                .replace(/^-|-$/g, '')          // Trim hyphens from start/end
                .substring(0, 50);              // Limit length
              
              if (summaryLabel && summaryLabel.length > 3) {
                labels.push(summaryLabel);
              }
              
              // Also add standard GitHub labels based on type
              if (issueType.toLowerCase().includes('bug')) {
                labels.push('bug');
              } else if (issueType.toLowerCase().includes('story') || issueType.toLowerCase().includes('feature')) {
                labels.push('enhancement');
              } else if (issueType.toLowerCase().includes('task')) {
                labels.push('task');
              }

              // Add priority label
              if (priority.toLowerCase().includes('high') || priority.toLowerCase().includes('highest')) {
                labels.push('priority: high');
              } else if (priority.toLowerCase().includes('low') || priority.toLowerCase().includes('lowest')) {
                labels.push('priority: low');
              }

              // Create GitHub issue body
              const issueBody = '## ' + jiraKey + ': ' + summary + '\n\n' +
                '### Description\n' + description + '\n\n' +
                '### Jira Details\n' +
                '- **Issue:** [' + jiraKey + '](' + jiraUrl + ')\n' +
                '- **Type:** ' + issueType + '\n' +
                '- **Priority:** ' + priority + '\n\n' +
                '---\n' +
                '*This issue was automatically created from Jira*';

              // Create the GitHub issue
              try {
                // Ensure labels exist
                for (const label of labels) {
                  try {
                    // Determine label color based on type
                    let labelColor = '1d76db'; // default blue for feature/module labels
                    if (label === 'bug') {
                      labelColor = 'd73a4a'; // red
                    } else if (label === 'enhancement') {
                      labelColor = 'a2eeef'; // cyan
                    } else if (label === 'task') {
                      labelColor = 'fbca04'; // yellow
                    } else if (label === 'jira-synced') {
                      labelColor = '0366d6'; // blue
                    } else if (label.includes('high')) {
                      labelColor = 'b60205'; // dark red
                    } else if (label.includes('low')) {
                      labelColor = 'c5def5'; // light blue
                    } else if (label.startsWith('type:')) {
                      // Type labels get purple color
                      labelColor = '7057ff';
                    } else if (label === summaryLabel) {
                      // Feature/module labels get teal color
                      labelColor = '0e8a16'; // green
                    }
                    
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label,
                      color: labelColor
                    });
                  } catch (e) {
                    // Label already exists
                  }
                }

                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: jiraKey + ': ' + summary,
                  body: issueBody,
                  labels: labels
                });

                console.log('Created issue #' + newIssue.data.number + ' for ' + jiraKey);
                createdCount++;
              } catch (error) {
                console.error('Failed to create issue for ' + jiraKey + ':', error.message);
              }
            }

            console.log('\n=== Create Phase Complete ===');
            console.log('Created: ' + createdCount + ' issues');
            console.log('Skipped: ' + skippedCount + ' (already exist)');

            // === PHASE 2: Close GitHub issues for completed Jira tasks ===
            console.log('\n=== Checking for completed Jira tasks ===');
            
            // Fetch Done issues from Jira
            const doneJql = 'project = ' + jiraProject + ' AND status = "Done" ORDER BY created DESC';
            let doneJiraKeys = new Set();
            let doneStartAt = 0;
            let doneHasMore = true;
            
            while (doneHasMore) {
              const doneSearchUrl = jiraBaseUrl + '/rest/api/3/search/jql?jql=' + encodeURIComponent(doneJql) + 
                '&startAt=' + doneStartAt + 
                '&maxResults=' + maxResults +
                '&fields=key';
              
              const doneResponse = await fetch(doneSearchUrl, {
                method: 'GET',
                headers: {
                  'Authorization': 'Basic ' + authHeader,
                  'Accept': 'application/json'
                }
              });

              if (doneResponse.ok) {
                const doneData = await doneResponse.json();
                const doneIssues = doneData.issues || doneData.values || [];
                
                doneIssues.forEach(function(issue) {
                  doneJiraKeys.add(issue.key);
                });
                
                doneStartAt += maxResults;
                if (doneData.total !== undefined) {
                  doneHasMore = doneStartAt < doneData.total;
                } else {
                  doneHasMore = doneIssues.length === maxResults;
                }
              } else {
                console.log('Could not fetch done issues, skipping close phase');
                doneHasMore = false;
              }
            }
            
            console.log('Found ' + doneJiraKeys.size + ' done Jira issues');
            
            // Close GitHub issues that have completed Jira tasks
            let closedCount = 0;
            
            for (const ghIssue of allGitHubIssues) {
              // Skip if already closed
              if (ghIssue.state === 'closed') continue;
              
              // Find Jira key in title or body
              const match = (ghIssue.title + ' ' + (ghIssue.body || '')).match(/PEZY-\d+/);
              if (match && doneJiraKeys.has(match[0])) {
                try {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: ghIssue.number,
                    state: 'closed',
                    state_reason: 'completed'
                  });
                  
                  // Add a comment explaining the closure
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: ghIssue.number,
                    body: 'This issue has been automatically closed because the linked Jira task **' + match[0] + '** was marked as Done.'
                  });
                  
                  console.log('Closed issue #' + ghIssue.number + ' - ' + match[0] + ' is Done');
                  closedCount++;
                } catch (error) {
                  console.error('Failed to close issue #' + ghIssue.number + ':', error.message);
                }
              }
            }
            
            console.log('\n=== Sync Complete ===');
            console.log('Created: ' + createdCount + ' new issues');
            console.log('Skipped: ' + skippedCount + ' (already exist)');
            console.log('Closed: ' + closedCount + ' (Jira task done)');
