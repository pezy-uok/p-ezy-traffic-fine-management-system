name: Build & Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: pezy-backend
  ECR_REPOSITORY_FRONTEND: pezy-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.image-backend.outputs.image }}
      frontend-image: ${{ steps.image-frontend.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend image
        id: image-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend image
        id: image-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Backend ECS Task Definition
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition pezy-backend \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' | jq -r .)
          
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ needs.build-and-push.outputs.backend-image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          
          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$(echo $NEW_TASK_DEF | jq -c .)" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.revision' \
            --output text)
          
          aws ecs update-service \
            --cluster pezy-cluster \
            --service pezy-backend-service \
            --task-definition pezy-backend:$NEW_REVISION \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update Frontend ECS Task Definition
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition pezy-frontend \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' | jq -r .)
          
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "${{ needs.build-and-push.outputs.frontend-image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          
          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$(echo $NEW_TASK_DEF | jq -c .)" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.revision' \
            --output text)
          
          aws ecs update-service \
            --cluster pezy-cluster \
            --service pezy-frontend-service \
            --task-definition pezy-frontend:$NEW_REVISION \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deployment Complete
        run: |
          echo "✅ Deployment triggered successfully!"
          echo "Images pushed to ECR and ECS services updated"
