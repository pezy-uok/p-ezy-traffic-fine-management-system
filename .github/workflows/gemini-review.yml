name: AI Code Review (Gemini)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Generate Gemini code review
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && contains(github.event.comment.body, 'gemini-review')
    steps:
      - name: Add rocket reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR information
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return {
              base: pr.data.base.ref,
              head: pr.data.head.ref,
              title: pr.data.title,
              description: pr.data.body || 'No description provided',
              author: pr.data.user.login
            };

      - name: Checkout PR branch
        run: |
          git fetch origin ${{ fromJSON(steps.pr_info.outputs.result).head }}
          git checkout ${{ fromJSON(steps.pr_info.outputs.result).head }}

      - name: Generate code diff
        id: diff
        run: |
          git fetch origin ${{ fromJSON(steps.pr_info.outputs.result).base }}
          DIFF=$(git diff origin/${{ fromJSON(steps.pr_info.outputs.result).base }}...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI code review with Gemini
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const prDetails = ${{ steps.pr_info.outputs.result }};
            const diff = process.env.PR_DIFF || '';

            const maxDiffLength = 50000;
            const truncatedDiff = diff.length > maxDiffLength
              ? diff.substring(0, maxDiffLength) + '\n\n... (diff truncated due to length)'
              : diff;

            const prompt = `You are an expert code reviewer. Review this pull request and provide constructive feedback.

            PR Title: ${prDetails.title}
            PR Description: ${prDetails.description}
            PR Author: ${prDetails.author}

            Code Changes:
            \`\`\`diff
            ${truncatedDiff}
            \`\`\`

            Please provide:
            1. A brief summary of the changes
            2. Potential issues or bugs
            3. Code quality and best practices feedback
            4. Security concerns (if any)
            5. Suggestions for improvement

            Keep your review concise and actionable.`;

            const geminiKey = process.env.GEMINI_API_KEY;

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  contents: [{
                    parts: [{
                      text: prompt
                    }]
                  }],
                  generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 8192
                  }
                })
              });

              if (!response.ok) {
                const errorBody = await response.text();
                throw new Error(`Gemini API returned ${response.status}: ${errorBody}`);
              }

              const data = await response.json();
              const review = data.candidates[0].content.parts[0].text;

              const commentBody = '## 🤖 Gemini Code Review\n\n' + review + '\n\n---\n*Review powered by Google Gemini*';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });

              console.log('✅ Gemini review posted successfully');
            } catch (error) {
              console.error('❌ Error during Gemini review:', error.message);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## 🤖 Gemini Code Review\n\n⚠️ Unable to generate automated review: ' + error.message
              });
            }
