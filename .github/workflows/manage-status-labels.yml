name: Manage Status Labels

on:
  issues:
    types: [labeled, closed]

permissions:
  issues: write
  contents: read

jobs:
  manage-status-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Manage Status Labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;

            console.log(`Event type: ${action} | Issue #${issueNumber}`);

            // Case 1: When a label is added to the issue
            if (action === 'labeled') {
              const label = context.payload.label;
              const isStatusLabel = label.name.startsWith('status:');
              
              if (!isStatusLabel) {
                console.log(`Label "${label.name}" is not a status label, skipping...`);
                return;
              }

              console.log(`✓ Status label added: "${label.name}"`);

              // Get all current labels on the issue
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              console.log(`Current labels: ${currentLabels.map(l => l.name).join(', ')}`);

              // Find all other status labels (excluding the one just added)
              const otherStatusLabels = currentLabels.filter(
                l => l.name.startsWith('status:') && l.name !== label.name
              );

              if (otherStatusLabels.length === 0) {
                console.log(`✓ No other status labels found. "${label.name}" is the only status label.`);
                return;
              }

              console.log(`Removing conflicting status labels: ${otherStatusLabels.map(l => l.name).join(', ')}`);

              // Remove other status labels
              for (const otherLabel of otherStatusLabels) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name: otherLabel.name
                  });
                  console.log(`  ✓ Removed: "${otherLabel.name}"`);
                } catch (error) {
                  console.log(`  ✗ Failed to remove "${otherLabel.name}": ${error.message}`);
                }
              }

              console.log(`✅ Status label management complete. Issue #${issueNumber} now has only "${label.name}" as status.`);
            }

            // Case 2: When an issue is closed (by PR merge or manually)
            if (action === 'closed') {
              console.log(`📌 Issue #${issueNumber} was closed`);

              // Get all current labels on the issue
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              const currentLabelNames = currentLabels.map(l => l.name);
              console.log(`Current labels: ${currentLabelNames.join(', ')}`);

              // Find existing status labels
              const existingStatusLabels = currentLabelNames.filter(l => l.startsWith('status:'));

              // Remove all existing status labels
              if (existingStatusLabels.length > 0) {
                console.log(`Removing existing status labels: ${existingStatusLabels.join(', ')}`);
                for (const statusLabel of existingStatusLabels) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: issueNumber,
                      name: statusLabel
                    });
                    console.log(`  ✓ Removed: "${statusLabel}"`);
                  } catch (error) {
                    console.log(`  ✗ Failed to remove "${statusLabel}": ${error.message}`);
                  }
                }
              }

              // Add "status: done" label
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['status: done']
                });
                console.log(`✅ Added "status: done" label to issue #${issueNumber}`);
              } catch (error) {
                console.log(`✗ Failed to add "status: done" label: ${error.message}`);
              }
            }
