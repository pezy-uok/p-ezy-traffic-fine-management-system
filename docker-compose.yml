version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pezy_backend
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRY: 15m
      # PayHere
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET}
      # AWS
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_REGION: ${AWS_REGION}
      # Email (AWS SES)
      SES_USER: ${SES_USER}
      SES_PASS: ${SES_PASS}
    env_file:
      - .env.docker
    networks:
      - pezy_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # Frontend Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pezy_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pezy_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

networks:
  pezy_network:
    driver: bridge
